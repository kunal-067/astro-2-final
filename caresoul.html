<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern Carousel</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#0f172a;
      font-family:Arial, Helvetica, sans-serif;
      overflow:hidden;
    }

    .carousel-wrapper{
      width:90%;
      max-width:1200px;
      position:relative;
    }

    .carousel{
      overflow:hidden;
      border-radius:28px;
      padding:20px 0;
    }

    .carousel-track{
      display:flex;
      gap:24px;
      transition:transform 0.7s cubic-bezier(.22,1,.36,1);
      will-change:transform;
    }

    .card{
      min-width:320px;
      height:420px;
      border-radius:28px;
      overflow:hidden;
      position:relative;
      flex-shrink:0;
      background:#1e293b;
      cursor:pointer;
      transition:transform .4s ease;
    }

    .card:hover{
      transform:translateY(-10px);
    }

    .card img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(
        to top,
        rgba(0,0,0,.85),
        rgba(0,0,0,.1)
      );
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      padding:24px;
      color:white;
    }

    .overlay h2{
      font-size:28px;
      margin-bottom:10px;
      font-weight:700;
    }

    .overlay p{
      color:#d1d5db;
      line-height:1.5;
      font-size:15px;
    }

    .btns{
      position:absolute;
      top:50%;
      left:0;
      width:100%;
      display:flex;
      justify-content:space-between;
      transform:translateY(-50%);
      pointer-events:none;
    }

    .btn{
      width:55px;
      height:55px;
      border:none;
      border-radius:50%;
      background:rgba(255,255,255,.12);
      backdrop-filter:blur(10px);
      color:white;
      font-size:22px;
      cursor:pointer;
      pointer-events:auto;
      transition:.3s;
    }

    .btn:hover{
      background:white;
      color:black;
      transform:scale(1.08);
    }

    .dots{
      display:flex;
      justify-content:center;
      gap:10px;
      margin-top:25px;
    }

    .dot{
      width:12px;
      height:12px;
      border-radius:50%;
      background:#475569;
      transition:.3s;
      cursor:pointer;
    }

    .dot.active{
      width:34px;
      border-radius:20px;
      background:white;
    }

    @media(max-width:768px){

      .card{
        min-width:85vw;
        height:380px;
      }

      .overlay h2{
        font-size:24px;
      }
    }

  </style>
</head>
<body>

  <div class="carousel-wrapper">

    <div class="carousel">
      <div class="carousel-track">

        <div class="card">
          <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop" alt="">
          <div class="overlay">
            <h2>Mountains</h2>
            <p>Beautiful cinematic mountain landscape with smooth animation.</p>
          </div>
        </div>

        <div class="card">
          <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1200&auto=format&fit=crop" alt="">
          <div class="overlay">
            <h2>Ocean</h2>
            <p>Modern glassmorphism carousel card with elegant transitions.</p>
          </div>
        </div>

        <div class="card">
          <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?q=80&w=1200&auto=format&fit=crop" alt="">
          <div class="overlay">
            <h2>Forest</h2>
            <p>Responsive layout optimized for desktop and mobile screens.</p>
          </div>
        </div>

        <div class="card">
          <img src="https://images.unsplash.com/photo-1519608487953-e999c86e7455?q=80&w=1200&auto=format&fit=crop" alt="">
          <div class="overlay">
            <h2>City</h2>
            <p>Smooth cubic-bezier scroll animation for premium feeling.</p>
          </div>
        </div>

      </div>
    </div>

    <div class="btns">
      <button class="btn prev">&#10094;</button>
      <button class="btn next">&#10095;</button>
    </div>

    <div class="dots"></div>

  </div>

  <script>

    const track = document.querySelector(".carousel-track");
    const cards = document.querySelectorAll(".card");
    const nextBtn = document.querySelector(".next");
    const prevBtn = document.querySelector(".prev");
    const dotsContainer = document.querySelector(".dots");

    let index = 0;

    // Create dots
    cards.forEach((_, i) => {
      const dot = document.createElement("div");
      dot.classList.add("dot");

      if(i === 0) dot.classList.add("active");

      dot.addEventListener("click", () => {
        index = i;
        updateCarousel();
      });

      dotsContainer.appendChild(dot);
    });

    const dots = document.querySelectorAll(".dot");

    function updateCarousel(){

      const cardWidth = cards[0].offsetWidth + 24;

      track.style.transform = `translateX(-${index * cardWidth}px)`;

      dots.forEach(dot => dot.classList.remove("active"));
      dots[index].classList.add("active");
    }

    nextBtn.addEventListener("click", () => {

      if(index < cards.length - 1){
        index++;
      } else {
        index = 0;
      }

      updateCarousel();
    });

    prevBtn.addEventListener("click", () => {

      if(index > 0){
        index--;
      } else {
        index = cards.length - 1;
      }

      updateCarousel();
    });

    // Auto slide
    setInterval(() => {

      if(index < cards.length - 1){
        index++;
      } else {
        index = 0;
      }

      updateCarousel();

    }, 4000);

  </script>

</body>
</html>
